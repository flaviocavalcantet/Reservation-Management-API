services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: reservation-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ReservationManagement}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reservation_network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: reservation-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reservation_network
    restart: unless-stopped

  # Reservation API
  reservation-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reservation-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-ReservationManagement};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      ConnectionStrings__Redis: "redis:6379"
      JwtSettings__SecretKey: "${JWT_SECRET_KEY:-QD+ZwS/Xd/+BsLAngdV6rHG80bIw8B/sOdvB0cNSJ1A=}" # Example secret key, should be overridden in production with a secure value
      JwtSettings__Issuer: "${JWT_ISSUER:-ReservationAPI}"
      JwtSettings__Audience: "${JWT_AUDIENCE:-ReservationWebApp}"
      JwtSettings__AccessTokenExpirationMinutes: "${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:-15}"
      JwtSettings__RefreshTokenExpirationDays: "${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:-7}"
      Auth0Settings__Authority: "${AUTH0_AUTHORITY:-}"
      Auth0Settings__Audience: "${AUTH0_AUDIENCE:-}"
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    networks:
      - reservation_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s



volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  reservation_network:
    driver: bridge
