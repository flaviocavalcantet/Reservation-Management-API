version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: reservation-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ReservationManagement
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reservation_network
    restart: unless-stopped

  # Reservation API
  reservation-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reservation-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=ReservationManagement;Username=postgres;Password=postgres"
      JwtSettings__SecretKey: "${JWT_SECRET_KEY:-your-secret-key-change-in-production}"
      JwtSettings__Issuer: "ReservationAPI"
      JwtSettings__Audience: "ReservationWebApp"
      JwtSettings__AccessTokenExpirationMinutes: "15"
      JwtSettings__RefreshTokenExpirationDays: "7"
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    networks:
      - reservation_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s



volumes:
  postgres_data:
    driver: local

networks:
  reservation_network:
    driver: bridge
