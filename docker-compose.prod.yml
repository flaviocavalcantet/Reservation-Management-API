# Production configuration - override for production deployments
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Database password must be set}"
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data

  reservation-api:
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      JwtSettings__SecretKey: "${JWT_SECRET_KEY:?JWT secret key must be set}"
    # Remove volume mounting or use named volumes only
    volumes: []
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  postgres_data:
    driver: local

networks:
  reservation_network:
    driver: bridge
